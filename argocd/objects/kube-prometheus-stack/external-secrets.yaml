# External Secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  refreshPolicy: OnChange
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password-sdk
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana-admin/username
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin/password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth
spec:
  refreshInterval: "60s"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password-sdk
  target:
    name: grafana-oauth
  data:
    - secretKey: client-id
      remoteRef:
        key: oidc-grafana/client-id
    - secretKey: client-secret
      remoteRef:
        key: oidc-grafana/client-secret
